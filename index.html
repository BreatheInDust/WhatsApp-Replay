<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Viewer — WhatsApp Chat Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── CSS Variables ─────────────────────────────────────────────── */
:root {
  --bg-base:       #0b1014;
  --bg-surface:    #141d22;
  --bg-panel:      #1e2c33;
  --bg-bubble-in:  #1e2c33;
  --bg-bubble-out: #005c4b;
  --bg-system:     rgba(30,44,51,0.85);
  --accent:        #00a884;
  --accent-dim:    #007a63;
  --accent-glow:   rgba(0,168,132,0.18);
  --text-primary:  #e9edef;
  --text-secondary:#8696a0;
  --text-muted:    #5a6e77;
  --text-timestamp:#8696a0;
  --border:        rgba(134,150,160,0.12);
  --shadow:        0 2px 12px rgba(0,0,0,0.35);
  --shadow-lg:     0 8px 32px rgba(0,0,0,0.45);
  --radius-bubble: 12px;
  --radius-md:     10px;
  --radius-lg:     16px;
  --font-body:     'DM Sans', sans-serif;
  --font-mono:     'JetBrains Mono', monospace;
  --header-h:      60px;
  --search-h:      52px;
  --transition:    0.18s ease;
}
[data-theme="light"] {
  --bg-base:       #f0f2f5;
  --bg-surface:    #ffffff;
  --bg-panel:      #f0f2f5;
  --bg-bubble-in:  #ffffff;
  --bg-bubble-out: #d9fdd3;
  --bg-system:     rgba(255,255,255,0.85);
  --accent:        #00a884;
  --accent-dim:    #007a63;
  --accent-glow:   rgba(0,168,132,0.12);
  --text-primary:  #111b21;
  --text-secondary:#667781;
  --text-muted:    #8696a0;
  --text-timestamp:#667781;
  --border:        rgba(0,0,0,0.08);
  --shadow:        0 2px 8px rgba(0,0,0,0.12);
  --shadow-lg:     0 8px 24px rgba(0,0,0,0.14);
}

/* ─── Reset ─────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-body);
  background:var(--bg-base);
  color:var(--text-primary);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input{font:inherit;color:inherit;border:none;outline:none;background:none}
a{color:inherit;text-decoration:none}

/* ─── Layout ─────────────────────────────────────────────────────── */
#app{
  display:grid;
  grid-template-columns:1fr;
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* ─── Upload Screen ───────────────────────────────────────────────── */
#upload-screen{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  padding:2rem;
  background:var(--bg-base);
  position:relative;
  overflow:hidden;
}
#upload-screen::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,168,132,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 20%, rgba(0,92,75,0.1) 0%, transparent 60%);
  pointer-events:none;
}
.upload-card{
  background:var(--bg-surface);
  border:1.5px dashed var(--border);
  border-radius:24px;
  padding:3.5rem 3rem;
  max-width:480px;
  width:100%;
  text-align:center;
  transition:border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  position:relative;
  z-index:1;
}
.upload-card.drag-over{
  border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-glow), var(--shadow-lg);
  transform:scale(1.01);
}
.upload-icon{
  width:72px;height:72px;
  background:var(--accent-glow);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.5rem;
  font-size:32px;
}
.upload-card h1{
  font-size:1.6rem;font-weight:600;
  margin-bottom:.5rem;
  letter-spacing:-.02em;
}
.upload-card p{
  color:var(--text-secondary);
  font-size:.9rem;
  margin-bottom:2rem;
  line-height:1.6;
}
.upload-btn{
  display:inline-flex;align-items:center;gap:.5rem;
  background:var(--accent);
  color:#fff;
  padding:.75rem 1.75rem;
  border-radius:50px;
  font-weight:500;
  font-size:.95rem;
  transition:background var(--transition), transform var(--transition), box-shadow var(--transition);
  cursor:pointer;
  border:none;
}
.upload-btn:hover{
  background:var(--accent-dim);
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,168,132,0.35);
}
.upload-hint{
  margin-top:1.5rem;
  font-size:.78rem;
  color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;gap:.4rem;
}
#file-input{display:none}
.supported-formats{
  display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;
  margin-top:1rem;
}
.format-badge{
  background:var(--bg-panel);
  padding:.2rem .6rem;
  border-radius:4px;
  font-size:.72rem;
  color:var(--text-muted);
  font-family:var(--font-mono);
}

/* ─── Loading ───────────────────────────────────────────────────── */
#loading-overlay{
  position:fixed;inset:0;
  background:var(--bg-base);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:1000;
  gap:1rem;
}
#loading-overlay.hidden{display:none}
.spinner{
  width:42px;height:42px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text-secondary);font-size:.9rem}
.loading-progress{
  width:200px;height:3px;
  background:var(--border);
  border-radius:2px;
  overflow:hidden;
}
.loading-bar{
  height:100%;
  background:var(--accent);
  border-radius:2px;
  width:0%;
  transition:width .3s ease;
}

/* ─── Chat View ─────────────────────────────────────────────────── */
#chat-view{
  display:none;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
  background:var(--bg-base);
}
#chat-view.active{display:flex}

/* ─── Header ───────────────────────────────────────────────────── */
#chat-header{
  height:var(--header-h);
  background:var(--bg-surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 1rem;
  gap:.75rem;
  flex-shrink:0;
  box-shadow:var(--shadow);
  position:relative;
  z-index:10;
}
#back-btn{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;
  transition:background var(--transition);
  flex-shrink:0;
  font-size:18px;
}
#back-btn:hover{background:var(--bg-panel)}
.chat-avatar{
  width:40px;height:40px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-dim));
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:1rem;
  color:#fff;flex-shrink:0;
  overflow:hidden;
}
.chat-avatar img{width:100%;height:100%;object-fit:cover}
.chat-info{flex:1;min-width:0}
.chat-name{
  font-weight:600;font-size:.95rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.chat-meta{
  font-size:.72rem;color:var(--text-secondary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.header-actions{display:flex;align-items:center;gap:.25rem}
.icon-btn{
  width:38px;height:38px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  transition:background var(--transition);
  flex-shrink:0;
}
.icon-btn:hover{background:var(--bg-panel)}

/* ─── Search Bar ────────────────────────────────────────────────── */
#search-bar{
  height:var(--search-h);
  background:var(--bg-surface);
  border-bottom:1px solid var(--border);
  display:none;
  align-items:center;
  padding:0 1rem;
  gap:.75rem;
  flex-shrink:0;
}
#search-bar.visible{display:flex}
#search-input{
  flex:1;
  background:var(--bg-panel);
  border-radius:50px;
  padding:.45rem 1rem;
  font-size:.9rem;
  color:var(--text-primary);
  border:1px solid transparent;
  transition:border-color var(--transition);
}
#search-input::placeholder{color:var(--text-muted)}
#search-input:focus{border-color:var(--accent)}
.search-nav{display:flex;align-items:center;gap:.4rem}
.search-count{
  font-size:.78rem;color:var(--text-secondary);
  white-space:nowrap;min-width:60px;text-align:center;
}
.search-nav-btn{
  width:30px;height:30px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  background:var(--bg-panel);
  transition:background var(--transition);
}
.search-nav-btn:hover{background:var(--accent);color:#fff}
.search-nav-btn:disabled{opacity:.4;pointer-events:none}

/* ─── Messages Area ─────────────────────────────────────────────── */
#messages-wrapper{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:1rem .75rem;
  display:flex;
  flex-direction:column;
  gap:0;
  scroll-behavior:smooth;
  background-image:
    radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0);
  background-size:24px 24px;
}
#messages-wrapper::-webkit-scrollbar{width:6px}
#messages-wrapper::-webkit-scrollbar-track{background:transparent}
#messages-wrapper::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:3px}

/* ─── Date Separator ────────────────────────────────────────────── */
.date-separator{
  display:flex;align-items:center;justify-content:center;
  margin:.75rem 0 .5rem;
}
.date-label{
  background:var(--bg-system);
  backdrop-filter:blur(8px);
  border:1px solid var(--border);
  padding:.3rem .9rem;
  border-radius:50px;
  font-size:.72rem;
  color:var(--text-secondary);
  font-weight:500;
  box-shadow:var(--shadow);
}

/* ─── System Message ────────────────────────────────────────────── */
.system-msg{
  display:flex;justify-content:center;
  margin:.3rem 0;
}
.system-msg-inner{
  background:var(--bg-system);
  backdrop-filter:blur(8px);
  border:1px solid var(--border);
  padding:.35rem 1rem;
  border-radius:8px;
  font-size:.72rem;
  color:var(--text-secondary);
  text-align:center;
  max-width:85%;
  line-height:1.5;
}

/* ─── Chat Bubbles ──────────────────────────────────────────────── */
.msg-row{
  display:flex;
  margin:.15rem 0;
  padding:0 .25rem;
  animation:msgIn .18s ease forwards;
  opacity:0;
}
@keyframes msgIn{
  from{opacity:0;transform:translateY(4px)}
  to{opacity:1;transform:translateY(0)}
}
.msg-row.out{justify-content:flex-end}
.msg-row.in{justify-content:flex-start}
.msg-row.group-first{margin-top:.5rem}
.msg-row.group-last{margin-bottom:.25rem}

.bubble{
  max-width:min(75%, 520px);
  position:relative;
  padding:.5rem .75rem .35rem;
  border-radius:var(--radius-bubble);
  box-shadow:var(--shadow);
  word-break:break-word;
  transition:box-shadow var(--transition);
}
.bubble:hover{box-shadow:var(--shadow-lg)}

.msg-row.in .bubble{
  background:var(--bg-bubble-in);
  border-top-left-radius:4px;
}
.msg-row.out .bubble{
  background:var(--bg-bubble-out);
  border-top-right-radius:4px;
}

/* Sender name inside bubble (group chats) */
.sender-name{
  font-size:.78rem;
  font-weight:600;
  margin-bottom:.2rem;
  line-height:1.2;
}
.msg-text{
  font-size:.9rem;
  line-height:1.55;
  white-space:pre-wrap;
}
.msg-footer{
  display:flex;align-items:center;
  justify-content:flex-end;
  gap:.3rem;
  margin-top:.25rem;
}
.msg-time{
  font-size:.68rem;
  color:var(--text-timestamp);
  white-space:nowrap;
}
.msg-row.out .msg-time{color:rgba(255,255,255,0.55)}

/* ─── Media Bubbles ─────────────────────────────────────────────── */
.media-bubble{padding:.35rem .35rem .35rem}
.media-caption{padding:.15rem .4rem .35rem;font-size:.85rem}
.media-img{
  display:block;
  max-width:280px;
  max-height:260px;
  min-width:120px;
  min-height:80px;
  width:100%;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  transition:opacity var(--transition);
}
.media-img:hover{opacity:.9}
.video-container{
  position:relative;
  max-width:280px;
  border-radius:8px;
  overflow:hidden;
  background:#000;
}
.video-container video{
  display:block;width:100%;max-height:220px;
  object-fit:cover;border-radius:8px;
}
.audio-player{
  display:flex;align-items:center;gap:.6rem;
  padding:.35rem .5rem;
  min-width:200px;
  max-width:280px;
}
.play-btn{
  width:40px;height:40px;border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;
  transition:background var(--transition), transform var(--transition);
  font-size:14px;color:#fff;
}
.play-btn:hover{background:var(--accent-dim);transform:scale(1.05)}
.audio-info{flex:1;min-width:0}
.audio-waveform{
  height:28px;display:flex;align-items:center;gap:1px;
  margin-bottom:.2rem;
}
.waveform-bar{
  flex:1;max-width:3px;
  background:var(--accent);
  border-radius:1px;
  opacity:.6;
  transition:height .1s ease;
}
.audio-duration{font-size:.7rem;color:var(--text-secondary)}
.media-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.35rem;
  padding:1rem 1.5rem;
  background:var(--bg-panel);
  border-radius:8px;
  min-width:160px;
  color:var(--text-muted);
  font-size:.78rem;
}
.media-placeholder .icon{font-size:28px}

/* ─── Search highlights ─────────────────────────────────────────── */
mark{
  background:rgba(255,215,0,.35);
  color:inherit;
  border-radius:2px;
  padding:0 1px;
}
.bubble.search-match{outline:2px solid var(--accent);outline-offset:2px}
.bubble.search-current{outline-color:#ffd700;box-shadow:0 0 0 4px rgba(255,215,0,.2)}

/* ─── Lightbox ──────────────────────────────────────────────────── */
#lightbox{
  position:fixed;inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  align-items:center;justify-content:center;
  z-index:999;
  cursor:pointer;
}
#lightbox.open{display:flex}
#lightbox img{
  max-width:92vw;max-height:88vh;
  object-fit:contain;
  border-radius:8px;
  cursor:default;
  box-shadow:0 8px 48px rgba(0,0,0,.6);
}
.lightbox-close{
  position:absolute;top:1.25rem;right:1.25rem;
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#fff;cursor:pointer;
  transition:background var(--transition);
}
.lightbox-close:hover{background:rgba(255,255,255,.25)}

/* ─── Stats Panel ───────────────────────────────────────────────── */
#stats-panel{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center;
  z-index:998;
}
#stats-panel.open{display:flex}
.stats-card{
  background:var(--bg-surface);
  width:min(520px,100%);
  border-radius:20px 20px 0 0;
  padding:1.5rem 1.5rem 2rem;
  max-height:72vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);
}
.stats-handle{
  width:36px;height:4px;
  background:var(--border);border-radius:2px;
  margin:0 auto 1.5rem;
}
.stats-title{font-size:1.1rem;font-weight:600;margin-bottom:1.25rem}
.stats-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:.75rem;
  margin-bottom:1.25rem;
}
.stat-item{
  background:var(--bg-panel);
  border-radius:var(--radius-md);
  padding:.85rem 1rem;
}
.stat-val{font-size:1.5rem;font-weight:600;color:var(--accent)}
.stat-lbl{font-size:.72rem;color:var(--text-secondary);margin-top:.1rem}
.participant-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
.participant-row{
  display:flex;align-items:center;gap:.75rem;
  padding:.5rem .75rem;
  background:var(--bg-panel);border-radius:8px;
}
.part-avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:600;color:#fff;flex-shrink:0;
}
.part-name{flex:1;font-size:.85rem}
.part-count{font-size:.78rem;color:var(--text-secondary)}
.part-bar-wrap{width:80px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.part-bar{height:100%;background:var(--accent);border-radius:3px}

/* ─── Toast ─────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(1rem);
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:50px;
  padding:.55rem 1.25rem;
  font-size:.82rem;
  color:var(--text-primary);
  box-shadow:var(--shadow-lg);
  opacity:0;pointer-events:none;
  transition:opacity .25s ease,transform .25s ease;
  z-index:9999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Replay Mode ───────────────────────────────────────────────── */
#replay-controls{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:50px;
  padding:.5rem 1rem;
  display:none;align-items:center;gap:.75rem;
  box-shadow:var(--shadow-lg);
  z-index:20;
}
#replay-controls.active{display:flex}
.replay-btn{
  display:flex;align-items:center;gap:.4rem;
  padding:.35rem .85rem;border-radius:50px;
  font-size:.8rem;font-weight:500;
  transition:background var(--transition);
}
#replay-play-btn{background:var(--accent);color:#fff}
#replay-play-btn:hover{background:var(--accent-dim)}
#replay-stop-btn{background:var(--bg-panel)}
#replay-stop-btn:hover{background:var(--border)}
#replay-progress{
  font-size:.75rem;color:var(--text-secondary);min-width:80px;text-align:center;
}
.replay-speed-btn{
  font-size:.75rem;color:var(--text-secondary);
  padding:.25rem .5rem;border-radius:12px;
  background:var(--bg-panel);
  transition:background var(--transition);
}
.replay-speed-btn.active{background:var(--accent);color:#fff}

/* ─── Jump to Bottom ───────────────────────────────────────────── */
#jump-bottom{
  position:fixed;bottom:5rem;right:1.5rem;
  width:42px;height:42px;border-radius:50%;
  background:var(--bg-surface);
  border:1px solid var(--border);
  display:none;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;
  box-shadow:var(--shadow);
  transition:opacity var(--transition),transform var(--transition);
  z-index:15;
}
#jump-bottom.visible{display:flex}
#jump-bottom:hover{transform:scale(1.1)}

/* ─── Responsive ────────────────────────────────────────────────── */
@media(min-width:768px){
  #messages-wrapper{padding:1rem 2rem}
  .bubble{max-width:min(65%,480px)}
}
@media(min-width:1100px){
  #app{max-width:900px;margin:0 auto}
  body{background:var(--bg-base)}
  #app{box-shadow:0 0 0 1px var(--border)}
}
</style>
</head>
<body>
<div id="app">

  <!-- ── Upload Screen ──────────────────────────── -->
  <div id="upload-screen">
    <div class="upload-card" id="drop-zone">
      <div class="upload-icon">💬</div>
      <h1>WA Viewer</h1>
      <p>Upload your WhatsApp chat export ZIP to explore it as a beautiful interactive timeline — entirely in your browser.</p>
      <label for="file-input" class="upload-btn">
        <span>📎</span> Choose ZIP File
      </label>
      <input type="file" id="file-input" accept=".zip">
      <p class="upload-hint">🔒 Everything stays on your device — no data is uploaded anywhere</p>
      <div class="supported-formats">
        <span class="format-badge">.zip export</span>
        <span class="format-badge">images</span>
        <span class="format-badge">voice notes</span>
        <span class="format-badge">videos</span>
      </div>
    </div>
  </div>

  <!-- ── Loading Overlay ───────────────────────── -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <div class="loading-progress"><div class="loading-bar" id="loading-bar"></div></div>
    <div class="loading-text" id="loading-text">Reading ZIP file…</div>
  </div>

  <!-- ── Chat View ──────────────────────────────── -->
  <div id="chat-view">
    <!-- Header -->
    <div id="chat-header">
      <button class="icon-btn" id="back-btn" title="New Chat">←</button>
      <div class="chat-avatar" id="chat-avatar">W</div>
      <div class="chat-info">
        <div class="chat-name" id="chat-name">Chat</div>
        <div class="chat-meta" id="chat-meta">Loading…</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="search-toggle-btn" title="Search">🔍</button>
        <button class="icon-btn" id="replay-toggle-btn" title="Replay mode">▶️</button>
        <button class="icon-btn" id="stats-toggle-btn" title="Chat stats">📊</button>
        <button class="icon-btn" id="theme-toggle-btn" title="Toggle theme">🌙</button>
      </div>
    </div>

    <!-- Search Bar -->
    <div id="search-bar">
      <input type="text" id="search-input" placeholder="Search messages…" autocomplete="off">
      <div class="search-nav">
        <span class="search-count" id="search-count"></span>
        <button class="search-nav-btn" id="search-prev-btn" disabled>↑</button>
        <button class="search-nav-btn" id="search-next-btn" disabled>↓</button>
        <button class="icon-btn" id="search-close-btn" style="font-size:16px">✕</button>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages-wrapper" role="log" aria-label="Chat messages"></div>

    <!-- Jump to bottom -->
    <button id="jump-bottom" title="Jump to bottom">↓</button>
  </div>

  <!-- ── Lightbox ───────────────────────────────── -->
  <div id="lightbox">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="Image preview">
  </div>

  <!-- ── Stats Panel ────────────────────────────── -->
  <div id="stats-panel">
    <div class="stats-card">
      <div class="stats-handle"></div>
      <div class="stats-title">💬 Chat Statistics</div>
      <div class="stats-grid" id="stats-grid"></div>
      <div id="stats-participants"></div>
      <button class="icon-btn" id="stats-close-btn" style="width:100%;border-radius:8px;background:var(--bg-panel);padding:.6rem;font-size:.85rem;margin-top:.5rem">Close</button>
    </div>
  </div>

  <!-- ── Replay Controls ────────────────────────── -->
  <div id="replay-controls">
    <button class="replay-btn" id="replay-play-btn">▶ Play</button>
    <span id="replay-progress">0 / 0</span>
    <button class="replay-speed-btn active" data-speed="1">1×</button>
    <button class="replay-speed-btn" data-speed="2">2×</button>
    <button class="replay-speed-btn" data-speed="5">5×</button>
    <button class="replay-btn" id="replay-stop-btn">✕ Exit</button>
  </div>

  <!-- ── Toast ─────────────────────────────────── -->
  <div id="toast"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// WHATSAPP CHAT VIEWER — Core JS
// ─────────────────────────────────────────────────────────────────────────────

// ── State ────────────────────────────────────────────────────────────────────
const state = {
  messages: [],
  mediaMap: {},
  participants: {},
  chatName: '',
  searchResults: [],
  searchIndex: -1,
  replayActive: false,
  replayPaused: true,
  replayIndex: 0,
  replaySpeed: 1,
  replayTimer: null,
  currentTheme: 'dark',
  isGroup: false,
};

// ── Helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = (tag, cls, html) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
};

function toast(msg, dur = 2200) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function setProgress(pct, txt) {
  $('loading-bar').style.width = pct + '%';
  if (txt) $('loading-text').textContent = txt;
}

// Color palette for participant avatars
const COLORS = [
  '#e17055','#00b894','#0984e3','#fdcb6e','#a29bfe',
  '#fd79a8','#6c5ce7','#00cec9','#fab1a0','#55efc4'
];
const participantColors = {};
let colorIdx = 0;
function getColor(name) {
  if (!participantColors[name]) {
    participantColors[name] = COLORS[colorIdx++ % COLORS.length];
  }
  return participantColors[name];
}

// ── ZIP Processing ────────────────────────────────────────────────────────────
async function processZip(file) {
  $('upload-screen').style.display = 'none';
  $('loading-overlay').classList.remove('hidden');
  setProgress(5, 'Reading ZIP file…');

  try {
    const zip = await JSZip.loadAsync(file);
    setProgress(20, 'Scanning files…');

    // Find the .txt chat file
    let txtFile = null;
    const mediaFiles = {};
    const entries = Object.keys(zip.files);

    for (const name of entries) {
      const entry = zip.files[name];
      if (entry.dir) continue;
      const base = name.split('/').pop();
      const lower = base.toLowerCase();

      if (lower.endsWith('.txt') && !txtFile) {
        txtFile = entry;
      } else if (/\.(jpg|jpeg|png|gif|webp|mp4|mov|3gp|aac|m4a|mp3|opus|ogg|pdf|doc|docx|xls|xlsx|zip|sticker|webp)$/i.test(lower)) {
        mediaFiles[base] = entry;
      }
    }

    if (!txtFile) throw new Error('No WhatsApp .txt export found in this ZIP.');
    setProgress(40, 'Parsing chat log…');

    const raw = await txtFile.async('string');
    setProgress(55, 'Building message index…');
    state.messages = parseChat(raw);

    if (state.messages.length === 0) throw new Error('No messages could be parsed from this chat export.');

    setProgress(70, 'Loading media files…');
    await loadMedia(mediaFiles, zip);

    setProgress(90, 'Rendering chat…');
    buildStats();
    renderChat();

    setProgress(100, 'Done!');
    setTimeout(() => {
      $('loading-overlay').classList.add('hidden');
      $('chat-view').classList.add('active');
      scrollToBottom(false);
    }, 300);

  } catch (err) {
    $('loading-overlay').classList.add('hidden');
    $('upload-screen').style.display = '';
    toast('⚠️ ' + err.message, 4000);
    console.error(err);
  }
}

// ── Chat Parser ───────────────────────────────────────────────────────────────
// Handles: dd/mm/yyyy, mm/dd/yyyy, yyyy-mm-dd, both 12h and 24h time
const DATE_PATTERNS = [
  // [M]M/[D]D/YYYY, HH:MM - or [D]D/[M]M/YYYY, HH:MM
  /^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),\s(\d{1,2}):(\d{2})(?::(\d{2}))?\s?(AM|PM)?\s?[-–]\s?/i,
  // YYYY-MM-DD, HH:MM
  /^(\d{4})-(\d{2})-(\d{2}),\s(\d{1,2}):(\d{2})(?::(\d{2}))?\s?[-–]\s?/i,
  // [D]D.[M]M.[YY]YY, HH:MM
  /^(\d{1,2})\.(\d{1,2})\.(\d{2,4}),\s(\d{1,2}):(\d{2})(?::(\d{2}))?\s?[-–]\s?/i,
];

function parseChat(raw) {
  // Normalize line endings, remove BOM / zero-width chars
  raw = raw.replace(/\r\n/g, '\n').replace(/\ufeff|\u200e|\u200f/g, '');
  const lines = raw.split('\n');
  const messages = [];
  let current = null;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const parsed = tryParseLine(line);

    if (parsed) {
      if (current) messages.push(finaliseMessage(current));
      current = parsed;
    } else if (current) {
      // Continuation of previous message (multiline)
      current.rawText += '\n' + line;
    }
  }
  if (current) messages.push(finaliseMessage(current));
  return messages;
}

function tryParseLine(line) {
  for (const pat of DATE_PATTERNS) {
    const m = line.match(pat);
    if (m) {
      const rest = line.slice(m[0].length);
      const ts = parseTimestamp(m, pat.toString());
      const colonIdx = rest.indexOf(': ');
      let sender = null, text = rest;

      if (colonIdx !== -1) {
        sender = rest.slice(0, colonIdx).trim();
        text = rest.slice(colonIdx + 2);
      }
      return { timestamp: ts, sender, rawText: text };
    }
  }
  return null;
}

function parseTimestamp(m, patStr) {
  let day, month, year, hour, min, sec=0, ampm;

  if (patStr.includes('(\\d{4})-')) {
    // ISO: yyyy-mm-dd
    year = parseInt(m[1]); month = parseInt(m[2])-1; day = parseInt(m[3]);
    hour = parseInt(m[4]); min = parseInt(m[5]);
  } else if (patStr.includes('\\.')) {
    // dot: dd.mm.yyyy
    day = parseInt(m[1]); month = parseInt(m[2])-1; year = parseInt(m[3]);
    hour = parseInt(m[4]); min = parseInt(m[5]);
  } else {
    // slash: mm/dd/yyyy or dd/mm/yyyy — heuristic: if first part ≤12 ambiguous; assume locale M/D
    const a = parseInt(m[1]), b = parseInt(m[2]);
    // If a > 12 it must be day, so it's DD/MM/YYYY
    if (a > 12) { day=a; month=b-1; }
    else { month=a-1; day=b; }
    year = parseInt(m[3]);
    hour = parseInt(m[4]); min = parseInt(m[5]);
    ampm = m[7];
  }

  if (year < 100) year += 2000;
  if (ampm) {
    if (ampm.toUpperCase() === 'PM' && hour < 12) hour += 12;
    if (ampm.toUpperCase() === 'AM' && hour === 12) hour = 0;
  }
  if (m[6]) sec = parseInt(m[6]);
  return new Date(year, month, day, hour, min, sec);
}

function finaliseMessage(msg) {
  const text = msg.rawText.trim();
  let type = 'text';
  let attachment = null;

  if (!msg.sender) {
    type = 'system';
  } else if (/^<?(Media omitted|image omitted|video omitted|audio omitted|sticker omitted)>?$/i.test(text)) {
    type = 'media-omitted';
  } else {
    // Attachment reference patterns
    const attachPat = /^(?:<attached:\s*(.+?)>|(.+)\s+\(file attached\))$/i;
    const am = text.match(attachPat);
    if (am) {
      attachment = (am[1] || am[2] || '').trim();
      const ext = attachment.split('.').pop().toLowerCase();
      if (/jpg|jpeg|png|gif|webp/.test(ext)) type = 'image';
      else if (/mp4|mov|3gp|avi/.test(ext)) type = 'video';
      else if (/aac|m4a|mp3|opus|ogg|amr/.test(ext)) type = 'audio';
      else type = 'file';
    }
    // Also check for inline attached filename at end
    const inlinePat = /(.+)\s+<(.+\..+)>$/;
    const im = text.match(inlinePat);
    if (im && !attachment) {
      attachment = im[2].trim();
      const ext = attachment.split('.').pop().toLowerCase();
      if (/jpg|jpeg|png|gif|webp/.test(ext)) type = 'image';
      else if (/mp4|mov|3gp/.test(ext)) type = 'video';
      else if (/aac|m4a|mp3|opus|ogg|amr/.test(ext)) type = 'audio';
      else type = 'file';
    }
  }

  if (msg.sender) {
    if (!state.participants[msg.sender]) state.participants[msg.sender] = { count: 0 };
    state.participants[msg.sender].count++;
  }

  return {
    id: Math.random().toString(36).slice(2),
    timestamp: msg.timestamp,
    sender: msg.sender,
    text: attachment ? '' : text,
    rawText: text,
    type,
    attachment,
  };
}

// ── Media Loading ────────────────────────────────────────────────────────────
async function loadMedia(mediaFiles, zip) {
  const names = Object.keys(mediaFiles);
  for (let i = 0; i < names.length; i++) {
    const name = names[i];
    try {
      const blob = await zip.files[mediaFiles[name].name].async('blob');
      const mime = guessMime(name);
      const url = URL.createObjectURL(new Blob([blob], { type: mime }));
      state.mediaMap[name] = url;
      // Also index without path prefix
      const base = name.split('/').pop();
      state.mediaMap[base] = url;
    } catch(e) { /* skip broken files */ }
    if (i % 10 === 0) setProgress(70 + Math.round(20 * i / names.length), `Loading media (${i+1}/${names.length})…`);
  }
}

function guessMime(name) {
  const ext = name.split('.').pop().toLowerCase();
  const map = {
    jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',
    webp:'image/webp',mp4:'video/mp4',mov:'video/quicktime',
    '3gp':'video/3gpp',aac:'audio/aac',m4a:'audio/mp4',mp3:'audio/mpeg',
    opus:'audio/ogg',ogg:'audio/ogg',amr:'audio/amr',pdf:'application/pdf',
  };
  return map[ext] || 'application/octet-stream';
}

// ── Stats ────────────────────────────────────────────────────────────────────
function buildStats() {
  const msgs = state.messages.filter(m => m.type !== 'system');
  const senders = Object.keys(state.participants);
  state.isGroup = senders.length > 2;
  state.chatName = senders.length === 1 ? senders[0] :
    senders.length === 2 ? senders.join(' & ') :
    senders.slice(0,3).join(', ') + (senders.length > 3 ? ` +${senders.length-3}` : '');

  if (msgs.length > 0) {
    const span = msgs[msgs.length-1].timestamp - msgs[0].timestamp;
    const days = Math.max(1, Math.round(span / 86400000));
    state.dateRange = `${fmtDate(msgs[0].timestamp)} – ${fmtDate(msgs[msgs.length-1].timestamp)}`;
    state.totalDays = days;
  }
  $('chat-name').textContent = state.chatName;
  $('chat-avatar').textContent = state.chatName.charAt(0).toUpperCase();
  $('chat-meta').textContent = `${msgs.length.toLocaleString()} messages${state.isGroup ? ` · ${senders.length} participants` : ''}`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderChat() {
  const wrap = $('messages-wrapper');
  wrap.innerHTML = '';
  const frag = document.createDocumentFragment();
  let lastDate = null;
  let lastSender = null;
  let rowIdx = 0;

  for (let i = 0; i < state.messages.length; i++) {
    const msg = state.messages[i];
    const dateStr = fmtDate(msg.timestamp);

    if (dateStr !== lastDate) {
      const sep = el('div', 'date-separator');
      sep.innerHTML = `<span class="date-label">${dateStr}</span>`;
      frag.appendChild(sep);
      lastDate = dateStr;
      lastSender = null;
    }

    if (msg.type === 'system') {
      const s = el('div', 'system-msg');
      s.innerHTML = `<div class="system-msg-inner">${escHtml(msg.text)}</div>`;
      frag.appendChild(s);
      lastSender = null;
      continue;
    }

    const isOut = isOutgoing(msg.sender);
    const sameGroup = msg.sender === lastSender;
    const nextSame = i+1 < state.messages.length && state.messages[i+1].sender === msg.sender;

    const row = el('div', `msg-row ${isOut ? 'out' : 'in'}${!sameGroup ? ' group-first' : ''}${!nextSame ? ' group-last' : ''}`);
    row.dataset.msgId = msg.id;
    row.dataset.idx = i;
    // Stagger animation
    row.style.animationDelay = Math.min(rowIdx * 8, 300) + 'ms';
    rowIdx++;

    const bubble = buildBubble(msg, isOut, sameGroup);
    row.appendChild(bubble);
    frag.appendChild(row);
    lastSender = msg.sender;
  }

  wrap.appendChild(frag);
}

// Determine outgoing: the last sender OR the sender with fewest messages in 2-person chat
let _outgoing = null;
function isOutgoing(sender) {
  if (!sender) return false;
  if (!_outgoing) {
    const parts = Object.entries(state.participants).sort((a,b) => b[1].count - a[1].count);
    // If 2 people: the one with fewer messages is typically "me"; otherwise last sender heuristic
    if (parts.length === 2) {
      _outgoing = parts[1][0]; // fewer messages = "me" (recipient exported)
    } else {
      _outgoing = parts[0][0]; // most messages
    }
  }
  return sender === _outgoing;
}

function buildBubble(msg, isOut, sameGroup) {
  const bubble = el('div', 'bubble');
  bubble.dataset.msgId = msg.id;

  // Sender name for group chats
  if (state.isGroup && !isOut && !sameGroup && msg.sender) {
    const sn = el('div', 'sender-name', escHtml(msg.sender));
    sn.style.color = getColor(msg.sender);
    bubble.appendChild(sn);
  }

  // Content
  switch (msg.type) {
    case 'image':   appendImage(bubble, msg); break;
    case 'video':   appendVideo(bubble, msg); break;
    case 'audio':   appendAudio(bubble, msg); break;
    case 'file':    appendFile(bubble, msg);  break;
    case 'media-omitted': appendOmitted(bubble); break;
    default:
      const txt = el('div', 'msg-text');
      txt.innerHTML = formatText(msg.text);
      bubble.appendChild(txt);
  }

  // Footer
  const footer = el('div', 'msg-footer');
  const time = el('span', 'msg-time', fmtTime(msg.timestamp));
  footer.appendChild(time);
  if (isOut) footer.innerHTML += `<span style="color:var(--accent);font-size:.7rem;margin-left:.1rem">✓✓</span>`;
  bubble.appendChild(footer);
  return bubble;
}

function appendImage(bubble, msg) {
  bubble.classList.add('media-bubble');
  const url = msg.attachment ? state.mediaMap[msg.attachment] : null;
  if (url) {
    const img = el('img', 'media-img');
    img.src = url;
    img.alt = msg.attachment || 'Image';
    img.loading = 'lazy';
    img.addEventListener('click', () => openLightbox(url));
    bubble.appendChild(img);
  } else {
    appendPlaceholder(bubble, '🖼️', msg.attachment || 'Image');
  }
  if (msg.text) {
    const cap = el('div', 'media-caption', escHtml(msg.text));
    bubble.appendChild(cap);
  }
}

function appendVideo(bubble, msg) {
  bubble.classList.add('media-bubble');
  const url = msg.attachment ? state.mediaMap[msg.attachment] : null;
  if (url) {
    const wrap = el('div', 'video-container');
    const v = el('video');
    v.src = url; v.controls = true; v.preload = 'metadata';
    wrap.appendChild(v);
    bubble.appendChild(wrap);
  } else {
    appendPlaceholder(bubble, '🎥', msg.attachment || 'Video');
  }
}

function appendAudio(bubble, msg) {
  bubble.classList.add('media-bubble');
  const url = msg.attachment ? state.mediaMap[msg.attachment] : null;
  const player = el('div', 'audio-player');

  const playBtn = el('button', 'play-btn', '▶');
  const info = el('div', 'audio-info');

  // Generate a random-ish waveform
  const wv = el('div', 'audio-waveform');
  for (let i = 0; i < 28; i++) {
    const bar = el('div', 'waveform-bar');
    bar.style.height = (30 + Math.sin(i * 0.9) * 20 + Math.random() * 25) + '%';
    wv.appendChild(bar);
  }
  const dur = el('div', 'audio-duration', url ? '0:00' : 'Voice note');
  info.appendChild(wv);
  info.appendChild(dur);
  player.appendChild(playBtn);
  player.appendChild(info);
  bubble.appendChild(player);

  if (url) {
    const audio = new Audio(url);
    let playing = false;
    audio.addEventListener('loadedmetadata', () => {
      dur.textContent = fmtDuration(audio.duration);
    });
    audio.addEventListener('timeupdate', () => {
      dur.textContent = fmtDuration(audio.currentTime) + ' / ' + fmtDuration(audio.duration);
      // Animate waveform bars
      const progress = audio.currentTime / audio.duration;
      [...wv.children].forEach((b, i) => {
        b.style.opacity = i / wv.children.length < progress ? '1' : '0.4';
      });
    });
    audio.addEventListener('ended', () => { playing = false; playBtn.textContent = '▶'; });
    playBtn.addEventListener('click', () => {
      if (playing) { audio.pause(); playBtn.textContent = '▶'; }
      else { audio.play(); playBtn.textContent = '⏸'; }
      playing = !playing;
    });
  } else {
    playBtn.disabled = true;
    dur.textContent = 'Not available';
  }
}

function appendFile(bubble, msg) {
  const name = msg.attachment || 'File';
  const url = state.mediaMap[name];
  const ext = name.split('.').pop().toUpperCase();
  bubble.innerHTML += `
    <div style="display:flex;align-items:center;gap:.6rem;padding:.1rem 0 .1rem">
      <div style="width:38px;height:38px;background:var(--accent-glow);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:var(--accent)">${ext}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(name)}</div>
        ${url ? `<a href="${url}" download="${escHtml(name)}" style="font-size:.72rem;color:var(--accent)">Download</a>` : '<span style="font-size:.72rem;color:var(--text-muted)">Not available</span>'}
      </div>
    </div>`;
}

function appendOmitted(bubble) {
  appendPlaceholder(bubble, '📎', 'Media omitted');
}

function appendPlaceholder(bubble, icon, label) {
  bubble.classList.add('media-bubble');
  const p = el('div', 'media-placeholder');
  p.innerHTML = `<span class="icon">${icon}</span><span>${escHtml(label)}</span>`;
  bubble.appendChild(p);
}

// ── Formatting helpers ───────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function formatText(text) {
  if (!text) return '';
  let t = escHtml(text);
  // Bold *text*
  t = t.replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>');
  // Italic _text_
  t = t.replace(/_([^_\n]+)_/g, '<em>$1</em>');
  // Strikethrough ~text~
  t = t.replace(/~([^~\n]+)~/g, '<del>$1</del>');
  // Monospace `text`
  t = t.replace(/`([^`\n]+)`/g, `<code style="font-family:var(--font-mono);font-size:.82em;background:rgba(128,128,128,.18);padding:.1em .25em;border-radius:3px">$1</code>`);
  // URLs
  t = t.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline">$1</a>');
  // Newlines
  t = t.replace(/\n/g, '<br>');
  return t;
}

function fmtDate(d) {
  if (!(d instanceof Date) || isNaN(d)) return '';
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today - 86400000);
  const dm = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (+dm === +today) return 'Today';
  if (+dm === +yesterday) return 'Yesterday';
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function fmtTime(d) {
  if (!(d instanceof Date) || isNaN(d)) return '';
  return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function fmtDuration(sec) {
  if (!isFinite(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + String(s).padStart(2, '0');
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLightbox(url) {
  $('lightbox-img').src = url;
  $('lightbox').classList.add('open');
}
$('lightbox').addEventListener('click', e => { if (e.target === $('lightbox')) $('lightbox').classList.remove('open'); });
$('lightbox-close').addEventListener('click', () => $('lightbox').classList.remove('open'));

// ── Search ───────────────────────────────────────────────────────────────────
let searchDebounce;
$('search-input').addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(runSearch, 280);
});

$('search-toggle-btn').addEventListener('click', () => {
  const bar = $('search-bar');
  bar.classList.toggle('visible');
  if (bar.classList.contains('visible')) $('search-input').focus();
  else clearSearch();
});

$('search-close-btn').addEventListener('click', () => {
  $('search-bar').classList.remove('visible');
  clearSearch();
});

$('search-prev-btn').addEventListener('click', () => navigateSearch(-1));
$('search-next-btn').addEventListener('click', () => navigateSearch(1));

$('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') navigateSearch(e.shiftKey ? -1 : 1);
  if (e.key === 'Escape') { $('search-bar').classList.remove('visible'); clearSearch(); }
});

function runSearch() {
  clearSearchHighlights();
  const q = $('search-input').value.trim();
  if (!q) { $('search-count').textContent = ''; updateSearchNav(); return; }

  const term = q.toLowerCase();
  const bubbles = document.querySelectorAll('.bubble');
  state.searchResults = [];

  bubbles.forEach(b => {
    const row = b.closest('.msg-row');
    if (!row) return;
    const idx = parseInt(row.dataset.idx);
    const msg = state.messages[idx];
    if (!msg) return;
    const msgText = (msg.text || msg.rawText || '').toLowerCase();
    if (msgText.includes(term)) {
      state.searchResults.push(b);
      b.classList.add('search-match');
      // Highlight text
      const textEl = b.querySelector('.msg-text');
      if (textEl) {
        const re = new RegExp('(' + escRegex(escHtml(q)) + ')', 'gi');
        textEl.innerHTML = textEl.innerHTML.replace(re, '<mark>$1</mark>');
      }
    }
  });

  state.searchIndex = state.searchResults.length ? 0 : -1;
  $('search-count').textContent = state.searchResults.length
    ? `${state.searchResults.length} result${state.searchResults.length !== 1 ? 's' : ''}`
    : 'No results';
  updateSearchNav();
  if (state.searchIndex >= 0) highlightCurrent();
}

function clearSearch() {
  $('search-input').value = '';
  clearSearchHighlights();
  $('search-count').textContent = '';
  state.searchResults = []; state.searchIndex = -1;
  updateSearchNav();
}

function clearSearchHighlights() {
  document.querySelectorAll('.search-match,.search-current').forEach(b => {
    b.classList.remove('search-match','search-current');
  });
  document.querySelectorAll('mark').forEach(m => {
    m.replaceWith(document.createTextNode(m.textContent));
  });
}

function navigateSearch(dir) {
  if (!state.searchResults.length) return;
  state.searchResults[state.searchIndex]?.classList.remove('search-current');
  state.searchIndex = (state.searchIndex + dir + state.searchResults.length) % state.searchResults.length;
  highlightCurrent();
  updateSearchNav();
}

function highlightCurrent() {
  const b = state.searchResults[state.searchIndex];
  if (!b) return;
  b.classList.add('search-current');
  b.scrollIntoView({ behavior: 'smooth', block: 'center' });
  $('search-count').textContent = `${state.searchIndex + 1} / ${state.searchResults.length}`;
}

function updateSearchNav() {
  const has = state.searchResults.length > 0;
  $('search-prev-btn').disabled = !has;
  $('search-next-btn').disabled = !has;
}

function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

// ── Scroll ───────────────────────────────────────────────────────────────────
function scrollToBottom(smooth = true) {
  const w = $('messages-wrapper');
  w.scrollTo({ top: w.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}

$('messages-wrapper').addEventListener('scroll', () => {
  const w = $('messages-wrapper');
  const distFromBottom = w.scrollHeight - w.scrollTop - w.clientHeight;
  $('jump-bottom').classList.toggle('visible', distFromBottom > 300);
});
$('jump-bottom').addEventListener('click', scrollToBottom);

// ── Stats Panel ───────────────────────────────────────────────────────────────
$('stats-toggle-btn').addEventListener('click', openStats);
$('stats-close-btn').addEventListener('click', () => $('stats-panel').classList.remove('open'));
$('stats-panel').addEventListener('click', e => { if (e.target === $('stats-panel')) $('stats-panel').classList.remove('open'); });

function openStats() {
  const msgs = state.messages.filter(m => m.type !== 'system');
  const images = state.messages.filter(m => m.type === 'image').length;
  const audio = state.messages.filter(m => m.type === 'audio').length;
  const video = state.messages.filter(m => m.type === 'video').length;

  $('stats-grid').innerHTML = `
    <div class="stat-item"><div class="stat-val">${msgs.length.toLocaleString()}</div><div class="stat-lbl">Total messages</div></div>
    <div class="stat-item"><div class="stat-val">${Object.keys(state.participants).length}</div><div class="stat-lbl">Participants</div></div>
    <div class="stat-item"><div class="stat-val">${images}</div><div class="stat-lbl">Images</div></div>
    <div class="stat-item"><div class="stat-val">${audio}</div><div class="stat-lbl">Voice notes</div></div>
    <div class="stat-item"><div class="stat-val">${video}</div><div class="stat-lbl">Videos</div></div>
    <div class="stat-item"><div class="stat-val">${state.totalDays || '–'}</div><div class="stat-lbl">Days active</div></div>
  `;

  const maxCount = Math.max(...Object.values(state.participants).map(p => p.count));
  const sorted = Object.entries(state.participants).sort((a,b) => b[1].count - a[1].count);
  const partHTML = sorted.map(([name, data]) => {
    const pct = Math.round(data.count / maxCount * 100);
    const color = getColor(name);
    return `
      <div class="participant-row">
        <div class="part-avatar" style="background:${color}">${name.charAt(0).toUpperCase()}</div>
        <div class="part-name">${escHtml(name)}</div>
        <div class="part-bar-wrap"><div class="part-bar" style="width:${pct}%;background:${color}"></div></div>
        <div class="part-count">${data.count.toLocaleString()}</div>
      </div>`;
  }).join('');

  $('stats-participants').innerHTML = `<div style="font-size:.8rem;font-weight:600;color:var(--text-secondary);margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.05em">Participants</div><div class="participant-list">${partHTML}</div>`;
  if (state.dateRange) {
    $('stats-participants').innerHTML += `<div style="font-size:.75rem;color:var(--text-muted);text-align:center;margin-top:.5rem">${state.dateRange}</div>`;
  }
  $('stats-panel').classList.add('open');
}

// ── Replay Mode ───────────────────────────────────────────────────────────────
$('replay-toggle-btn').addEventListener('click', () => {
  if (state.replayActive) return;
  state.replayActive = true;
  state.replayPaused = true;
  state.replayIndex = 0;
  $('replay-controls').classList.add('active');
  // Hide all messages
  document.querySelectorAll('.msg-row,.date-separator,.system-msg').forEach(e => e.style.visibility = 'hidden');
  $('messages-wrapper').scrollTo({top:0,behavior:'instant'});
  $('replay-progress').textContent = `0 / ${state.messages.length}`;
  toast('▶ Press Play to start replay');
});

$('replay-play-btn').addEventListener('click', () => {
  if (state.replayPaused) { state.replayPaused = false; $('replay-play-btn').textContent = '⏸ Pause'; runReplay(); }
  else { state.replayPaused = true; $('replay-play-btn').textContent = '▶ Play'; clearTimeout(state.replayTimer); }
});

$('replay-stop-btn').addEventListener('click', stopReplay);

document.querySelectorAll('.replay-speed-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.replay-speed-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.replaySpeed = parseFloat(b.dataset.speed);
  });
});

function runReplay() {
  if (state.replayPaused || !state.replayActive) return;
  if (state.replayIndex >= state.messages.length) {
    state.replayPaused = true; $('replay-play-btn').textContent = '▶ Play';
    toast('✅ Replay complete');
    return;
  }

  const all = [...document.querySelectorAll('[data-idx]')];
  const row = all.find(r => parseInt(r.dataset.idx) === state.replayIndex);
  if (row) {
    row.style.visibility = 'visible';
    // Show date separator if first in date group
    const prev = row.previousElementSibling;
    if (prev && prev.classList.contains('date-separator')) prev.style.visibility = 'visible';
    if (prev && prev.classList.contains('system-msg')) prev.style.visibility = 'visible';
    row.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  state.replayIndex++;
  $('replay-progress').textContent = `${state.replayIndex} / ${state.messages.length}`;
  const delay = Math.max(40, 400 / state.replaySpeed);
  state.replayTimer = setTimeout(runReplay, delay);
}

function stopReplay() {
  clearTimeout(state.replayTimer);
  state.replayActive = false; state.replayPaused = true;
  $('replay-controls').classList.remove('active');
  document.querySelectorAll('.msg-row,.date-separator,.system-msg').forEach(e => e.style.visibility = '');
  scrollToBottom(false);
}

// ── Theme ────────────────────────────────────────────────────────────────────
$('theme-toggle-btn').addEventListener('click', () => {
  state.currentTheme = state.currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = state.currentTheme;
  $('theme-toggle-btn').textContent = state.currentTheme === 'dark' ? '🌙' : '☀️';
});

// ── Back / Reset ─────────────────────────────────────────────────────────────
$('back-btn').addEventListener('click', () => {
  if (!confirm('Load a new chat? Current chat will be cleared.')) return;
  resetApp();
});

function resetApp() {
  // Revoke object URLs
  Object.values(state.mediaMap).forEach(url => URL.revokeObjectURL(url));
  Object.assign(state, {
    messages:[], mediaMap:{}, participants:{}, chatName:'',
    searchResults:[], searchIndex:-1, replayActive:false,
    replayPaused:true, replayIndex:0, isGroup:false,
  });
  _outgoing = null;
  colorIdx = 0;
  Object.keys(participantColors).forEach(k => delete participantColors[k]);
  stopReplay();
  $('search-bar').classList.remove('visible');
  clearSearch();
  $('chat-view').classList.remove('active');
  $('upload-screen').style.display = '';
  $('messages-wrapper').innerHTML = '';
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────
const dz = $('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.zip')) processZip(f);
  else toast('⚠️ Please drop a .zip file');
});

$('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) processZip(f);
  e.target.value = '';
});

// Allow drag over the whole body
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.zip')) processZip(f);
});

// ── Keyboard Shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    $('lightbox').classList.remove('open');
    $('stats-panel').classList.remove('open');
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
    e.preventDefault();
    $('search-bar').classList.add('visible');
    $('search-input').focus();
  }
});
</script>
</body>
</html>
